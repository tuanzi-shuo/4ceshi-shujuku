<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元生智护系统 - 档案管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #2d3748;
            line-height: 1.7;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 0 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1440px;
            margin: 0 auto;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.6rem;
            font-weight: 600;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background-color: white;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 8px;
        }

        .nav-item {
            margin: 0 4px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .user-details {
            font-size: 0.95rem;
        }

        .user-name {
            font-weight: 600;
        }

        .user-dept {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* 主容器 */
        .main-container {
            max-width: 1440px;
            margin: 32px auto;
            padding: 0 24px;
            display: flex;
            gap: 32px;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            height: fit-content;
        }

        .sidebar-section {
            margin-bottom: 28px;
        }

        .sidebar-title {
            color: #2563eb;
            font-size: 1.1rem;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 0.95rem;
        }

        .filter-item:hover, .filter-item.active {
            background-color: #eff6ff;
        }

        .filter-count {
            background-color: #dbeafe;
            color: #2563eb;
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-draft { background-color: #f59e0b; }
        .status-archived { background-color: #10b981; }
        .status-pending { background-color: #3b82f6; }

        .add-btn {
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
        }

        /* 主内容 */
        .content-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 搜索栏 */
        .search-bar {
            background: white;
            padding: 18px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .time-filter {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .time-input {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .search-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .search-btn:hover {
            background-color: #1d4ed8;
        }

        /* 档案列表 */
        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .archive-item {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .archive-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .item-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .item-meta {
            display: flex;
            gap: 16px;
            color: #64748b;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .item-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-draft-bg { background-color: #fef3c7; color: #d97706; } /* 待提交 */
        .status-archived-bg { background-color: #dcfce7; color: #15803d; } /* 已归档 */
        .status-pending-bg { background-color: #dbeafe; color: #1d4ed8; } /* 待归档 */

        .item-actions {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            background: none;
            border: 1px solid #e2e8f0;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .btn-edit:hover {
            background-color: #dbeafe;
            border-color: #2563eb;
            color: #2563eb;
        }

        .btn-delete {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-delete:hover {
            background-color: #fee2e2;
            border-color: #dc2626;
            color: #dc2626;
        }

        .item-excerpt {
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .item-stats {
            display: flex;
            gap: 24px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .preview-btn {
            background: none;
            border: 1px solid #2563eb;
            color: #2563eb;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .preview-btn:hover {
            background-color: #2563eb;
            color: white;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        .page-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .page-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .page-btn:disabled {
            background-color: #f8fafc;
            color: #cbd5e1;
            cursor: not-allowed;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            color: #2563eb;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #2563eb;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2d3748;
            font-size: 0.95rem;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 28px;
        }

        .btn-secondary {
            background-color: #f8fafc;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
        }

        .btn-save-draft {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-save-draft:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(245, 158, 11, 0.25);
        }

        .btn-archive {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-archive:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.25);
        }

        /* 订单选择模态框 */
        .order-select-modal {
            max-width: 900px;
        }

        .order-search {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .order-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .order-item {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .order-item:hover {
            background-color: #f8fafc;
        }

        .order-item.selected {
            background-color: #eff6ff;
        }

        .order-id {
            font-weight: 600;
            color: #2563eb;
        }

        .order-meta {
            display: flex;
            gap: 12px;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* 预览模态框 */
        .preview-modal {
            max-width: 900px;
        }

        .preview-content {
            background-color: #f8fafc;
            padding: 24px;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 16px;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .preview-title {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #2d3748;
            font-weight: 600;
        }

        .preview-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: #64748b;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        /* 确认对话框 */
        .confirm-dialog {
            background: white;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .confirm-title {
            color: #2d3748;
            font-size: 1.3rem;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .confirm-message {
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .confirm-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn-cancel {
            background-color: #f8fafc;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-cancel:hover {
            background-color: #f1f5f9;
        }

        .btn-confirm {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-confirm:hover {
            background-color: #b91c1c;
        }

        /* 提示弹窗 */
        .alert-dialog {
            background: white;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }

        .alert-title {
            color: #2563eb;
            font-size: 1.3rem;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .alert-message {
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .alert-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn-ok {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
            min-width: 100px;
        }

        .btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                height: auto;
                padding: 16px 0;
            }

            .nav-menu {
                margin-top: 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .user-info {
                margin-top: 16px;
            }

            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .time-filter {
                flex-wrap: wrap;
            }

            .item-header {
                flex-direction: column;
                gap: 12px;
            }

            .item-actions {
                align-self: flex-start;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .form-actions {
                flex-direction: column;
            }

            .confirm-actions, .alert-actions {
                flex-direction: column;
            }

            .order-search {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">元</div>
                <span>元生智护系统（医护端）</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item"><a href="医护端首页.html" class="nav-link">首页</a></li>
                <li class="nav-item"><a href="医护端咨询管理.html" class="nav-link">咨询管理</a></li>
                <li class="nav-item"><a href="医护端知识库管理.html" class="nav-link">知识库管理</a></li>
                <li class="nav-item"><a href="医护端档案管理.html" class="nav-link active">档案管理</a></li>
                <li class="nav-item"><a href="医护端个人中心.html" class="nav-link">个人中心</a></li>
            </ul>
            
            <div class="user-info">
                <div class="user-avatar">张</div>
                <div class="user-details">
                    <div class="user-name">张文华医生</div>
                    <div class="user-dept">心内科 | 主任医师</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">咨询来源</h3>
                <ul class="filter-list">
                    <li class="filter-item active" onclick="filterBySource('all')">
                        <span>全部来源</span>
                        <span class="filter-count" id="count-source-all">0</span>
                    </li>
                    <li class="filter-item" onclick="filterBySource('imageText')">
                        <span>图文咨询</span>
                        <span class="filter-count" id="count-source-imageText">0</span>
                    </li>
                    <li class="filter-item" onclick="filterBySource('phone')">
                        <span>电话咨询</span>
                        <span class="filter-count" id="count-source-phone">0</span>
                    </li>
                    <li class="filter-item" onclick="filterBySource('video')">
                        <span>视频咨询</span>
                        <span class="filter-count" id="count-source-video">0</span>
                    </li>
                </ul>
            </div>
            
            <div class="sidebar-section">
                <h3 class="sidebar-title">档案状态</h3>
                <ul class="filter-list">
                    <li class="filter-item active" onclick="filterByStatus('all')">
                        <div class="status-info">
                            <div class="status-dot" style="background-color: #2563eb;"></div>
                            <span>全部状态</span>
                        </div>
                        <span class="filter-count" id="count-status-all">0</span>
                    </li>
                    <li class="filter-item" onclick="filterByStatus('pending')">
                        <div class="status-info">
                            <div class="status-dot status-pending"></div>
                            <span>待归档</span>
                        </div>
                        <span class="filter-count" id="count-status-pending">0</span>
                    </li>
                    <li class="filter-item" onclick="filterByStatus('draft')">
                        <div class="status-info">
                            <div class="status-dot status-draft"></div>
                            <span>待提交</span>
                        </div>
                        <span class="filter-count" id="count-status-draft">0</span>
                    </li>
                    <li class="filter-item" onclick="filterByStatus('archived')">
                        <div class="status-info">
                            <div class="status-dot status-archived"></div>
                            <span>已归档</span>
                        </div>
                        <span class="filter-count" id="count-status-archived">0</span>
                    </li>
                </ul>
            </div>
            
            <button class="add-btn" onclick="showOrderSelectModal()">
                <span>+</span> 新建咨询档案
            </button>
        </div>
        
        <!-- 主内容 -->
        <div class="content-main">

                <div class="form-group">

                <div class="form-group">
                    <label class="form-label">补充说明</label>

                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeCreateModal()">取消</button>
                    <button type="button" class="btn-save-draft" onclick="saveArchiveAsDraft()">保存为待提交</button>
                    <button type="button" class="btn-archive" onclick="archivePatient()">归档档案</button>
                </div>

    <script>
        // 模拟咨询订单数据（新建档案前需选择）
        let consultationOrders = [
            {
                id: 101,

            {

            },
            {
                id: 104,
                orderId: "DD20260604004",
                patientName: "陈静",
                gender: "female",
                age: 65,
                phone: "136****3456",
                consultSource: "imageText",
                consultTime: "2026-06-04T10:15",
                userConsultContent: "术后3个月复查咨询，上传检查报告请求解读",
                status: "pending"
            }
        ];

        // 模拟咨询档案数据（已创建的档案）
        let consultationArchives = [
            {
                id: 1,
                patientName: "刘伟",
                gender: "male",
                age: 50,
                phone: "135****7890",
                consultId: "DD20260531005",
                consultSource: "imageText",
                consultTime: "2026-05-31T15:30",
                userConsultContent: "心悸、乏力1周，无胸闷胸痛，咨询可能原因",
                medicalSolution: "1. 考虑心律失常可能，建议完善动态心电图；2. 胺碘酮控制心室率；3. 调整甲巯咪唑剂量；4. 1周后复查甲状腺功能",
                additionalNotes: "患者暂拒绝手术，需进一步沟通",
                status: "draft",
                statusText: "待提交",
                createTime: "2026-05-31 16:00",
                updateTime: "2026-05-31 16:00"
            },
            {
                id: 2,
                patientName: "孙丽",
                gender: "female",
                age: 29,
                phone: "134****2345",
                consultId: "DD20260530006",
                consultSource: "phone",
                consultTime: "2026-05-30T11:20",
                userConsultContent: "孕期血糖偏高，咨询饮食控制和运动建议",
                medicalSolution: "1. 低碳水化合物饮食（每日150g以内），分5-6餐；2. 餐后30分钟散步30分钟；3. 监测空腹及餐后2小时血糖；4. 2周后复查糖化血红蛋白",
                additionalNotes: "需补充叶酸摄入建议",
                status: "archived",
                statusText: "已归档",
                createTime: "2026-05-30 12:00",
                updateTime: "2026-05-30 14:30"
            }
        ];
        
        // 当前筛选条件
        let currentFilter = {
            source: 'all',
            status: 'all',
            search: '',
            startDate: null,
            endDate: null
        };
        
        // 当前编辑/删除/选择的档案ID
        let editingArchiveId = null;
        let deletingArchiveId = null;
        let selectedOrderId = null;
        
        // 分页变量
        let currentPage = 1;
        const pageSize = 5;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderArchives(getCurrentPageArchives());
            updateSourceCounts();
            updateStatusCounts();
            updatePagination();
            renderOrderList(consultationOrders); // 初始渲染订单列表
        });
        
        // 获取当前页档案
        function getCurrentPageArchives() {
            let filtered = consultationArchives;
            
            // 来源筛选
            if (currentFilter.source !== 'all') {
                filtered = filtered.filter(a => a.consultSource === currentFilter.source);
            }
            
            // 状态筛选
            if (currentFilter.status !== 'all') {
                filtered = filtered.filter(a => a.status === currentFilter.status);
            }
            
            // 时间筛选
            if (currentFilter.startDate) {
                const startTime = new Date(currentFilter.startDate).getTime();
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() >= startTime);
            }
            if (currentFilter.endDate) {
                const endTime = new Date(currentFilter.endDate).getTime() + 86400000; // 包含当天
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() < endTime);
            }
            
            // 搜索筛选
            if (currentFilter.search) {
                const kw = currentFilter.search.toLowerCase();
                filtered = filtered.filter(a => 
                    a.patientName.toLowerCase().includes(kw) ||
                    a.consultId.toLowerCase().includes(kw) ||
                    a.userConsultContent.toLowerCase().includes(kw) ||
                    a.medicalSolution.toLowerCase().includes(kw)
                );
            }
            
            // 分页
            const start = (currentPage - 1) * pageSize;
            return filtered.slice(start, start + pageSize);
        }
        
        // 渲染档案列表
        function renderArchives(archives) {
            const list = document.getElementById('archiveList');
            list.innerHTML = '';
            
            if (archives.length === 0) {
                list.innerHTML = '<div class="archive-item" style="text-align: center; color: #64748b; padding: 40px;">暂无相关档案</div>';
                return;
            }
            
            archives.forEach(archive => {
                const item = document.createElement('div');
                item.className = 'archive-item';
                
                // 状态样式
                let statusClass = '';
                if (archive.status === 'draft') statusClass = 'status-draft-bg'; // 待提交
                else if (archive.status === 'archived') statusClass = 'status-archived-bg'; // 已归档
                else if (archive.status === 'pending') statusClass = 'status-pending-bg'; // 待归档
                
                // 来源文本
                const sourceText = {
                    imageText: '图文咨询',
                    phone: '电话咨询',
                    video: '视频咨询'
                }[archive.consultSource] || archive.consultSource;
                
                item.innerHTML = `
                    <div class="item-header">
                        <div>
                            <h3 class="item-title">${archive.patientName} (${archive.age}岁, ${archive.gender === 'male' ? '男' : archive.gender === 'female' ? '女' : '其他'})</h3>
                            <div class="item-meta">
                                <span>咨询ID: ${archive.consultId}</span>
                                <span>来源: ${sourceText}</span>
                                <span>时间: ${new Date(archive.consultTime).toLocaleString()}</span>
                                <span>医生: 张文华医生</span>
                            </div>
                        </div>
                        <div>
                            <span class="item-status ${statusClass}">${archive.statusText}</span>
                            <div class="item-actions">
                                <button class="btn-icon btn-edit" onclick="editArchive(${archive.id})" title="编辑">✏️</button>
                                <button class="btn-delete" onclick="showDeleteConfirm(${archive.id}, '${archive.patientName}')">删除</button>
                            </div>
                        </div>
                    </div>
                    <p class="item-excerpt"><strong>用户咨询:</strong> ${archive.userConsultContent}<br><strong>医护方案:</strong> ${archive.medicalSolution}</p>
                    <div class="item-footer">
                        <div class="item-stats">
                            <span>创建: ${archive.createTime}</span>
                            <span>更新: ${archive.updateTime}</span>
                        </div>
                        <button class="preview-btn" onclick="previewArchive(${archive.id})">预览</button>
                    </div>
                `;
                
                list.appendChild(item);
            });
        }
        
        // 更新来源计数
        function updateSourceCounts() {
            const counts = {
                all: consultationArchives.length,
                imageText: consultationArchives.filter(a => a.consultSource === 'imageText').length,
                phone: consultationArchives.filter(a => a.consultSource === 'phone').length,
                video: consultationArchives.filter(a => a.consultSource === 'video').length
            };
            
            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-source-${key}`);
                if (el) el.textContent = counts[key];
            });
        }
        
        // 更新状态计数
        function updateStatusCounts() {
            const counts = {
                all: consultationArchives.length,
                pending: consultationArchives.filter(a => a.status === 'pending').length,
                draft: consultationArchives.filter(a => a.status === 'draft').length,
                archived: consultationArchives.filter(a => a.status === 'archived').length
            };
            
            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-status-${key}`);
                if (el) el.textContent = counts[key];
            });
        }
        
        // 来源筛选
        function filterBySource(source) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.filter-item').classList.add('active');
            currentFilter.source = source;
            currentPage = 1;
            renderArchives(getCurrentPageArchives());
            updatePagination();
        }
        
        // 状态筛选
        function filterByStatus(status) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.filter-item').classList.add('active');
            currentFilter.status = status;
            currentPage = 1;
            renderArchives(getCurrentPageArchives());
            updatePagination();
        }
        
        // 时间筛选
        function filterByTime() {
            currentFilter.startDate = document.getElementById('startDate').value;
            currentFilter.endDate = document.getElementById('endDate').value;
            currentPage = 1;
            renderArchives(getCurrentPageArchives());
            updatePagination();
        }
        
        // 搜索档案
        function searchArchives() {
            currentFilter.search = document.getElementById('searchInput').value.trim().toLowerCase();
            currentPage = 1;
            renderArchives(getCurrentPageArchives());
            updatePagination();
        }
        
        // 更新分页
        function updatePagination() {
            let filtered = consultationArchives;
            
            // 应用筛选
            if (currentFilter.source !== 'all') filtered = filtered.filter(a => a.consultSource === currentFilter.source);
            if (currentFilter.status !== 'all') filtered = filtered.filter(a => a.status === currentFilter.status);
            if (currentFilter.startDate) {
                const startTime = new Date(currentFilter.startDate).getTime();
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() >= startTime);
            }
            if (currentFilter.endDate) {
                const endTime = new Date(currentFilter.endDate).getTime() + 86400000;
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() < endTime);
            }
            if (currentFilter.search) {
                const kw = currentFilter.search.toLowerCase();
                filtered = filtered.filter(a => 
                    a.patientName.toLowerCase().includes(kw) ||
                    a.consultId.toLowerCase().includes(kw) ||
                    a.userConsultContent.toLowerCase().includes(kw) ||
                    a.medicalSolution.toLowerCase().includes(kw)
                );
            }
            
            const total = filtered.length;
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            if (totalPages === 0) return;
            
            // 上一页
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => changePage(currentPage - 1);
            pagination.appendChild(prevBtn);
            
            // 页码
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = 'page-btn';
                if (i === currentPage) btn.classList.add('active');
                btn.textContent = i;
                btn.onclick = () => changePage(i);
                pagination.appendChild(btn);
            }
            
            // 下一页
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => changePage(currentPage + 1);
            pagination.appendChild(nextBtn);
        }
        
        // 切换页面
        function changePage(page) {
            let filtered = consultationArchives;
            if (currentFilter.source !== 'all') filtered = filtered.filter(a => a.consultSource === currentFilter.source);
            if (currentFilter.status !== 'all') filtered = filtered.filter(a => a.status === currentFilter.status);
            if (currentFilter.startDate) {
                const startTime = new Date(currentFilter.startDate).getTime();
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() >= startTime);
            }
            if (currentFilter.endDate) {
                const endTime = new Date(currentFilter.endDate).getTime() + 86400000;
                filtered = filtered.filter(a => new Date(a.consultTime).getTime() < endTime);
            }
            if (currentFilter.search) {
                const kw = currentFilter.search.toLowerCase();
                filtered = filtered.filter(a => 
                    a.patientName.toLowerCase().includes(kw) ||
                    a.consultId.toLowerCase().includes(kw) ||
                    a.userConsultContent.toLowerCase().includes(kw) ||
                    a.medicalSolution.toLowerCase().includes(kw)
                );
            }
            
            const totalPages = Math.ceil(filtered.length / pageSize);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderArchives(getCurrentPageArchives());
            updatePagination();
        }
        
        // 显示订单选择模态框
        function showOrderSelectModal() {
            document.getElementById('orderSelectModal').style.display = 'flex';
            document.getElementById('orderSearchInput').value = '';
            selectedOrderId = null;
            document.getElementById('confirmOrderBtn').disabled = true;
            renderOrderList(consultationOrders);
        }
        
        // 关闭订单选择模态框
        function closeOrderSelectModal() {
            document.getElementById('orderSelectModal').style.display = 'none';
        }
        
        // 渲染订单列表
        function renderOrderList(orders) {
            const list = document.getElementById('orderList');
            list.innerHTML = '';
            
            if (orders.length === 0) {
                list.innerHTML = '<div class="order-item" style="text-align: center; color: #64748b; padding: 20px;">未找到匹配的订单</div>';
                return;
            }
            
            orders.forEach(order => {
                const item = document.createElement('div');
                item.className = 'order-item';
                if (selectedOrderId === order.id) item.classList.add('selected');
                
                const sourceText = {
                    imageText: '图文咨询',
                    phone: '电话咨询',
                    video: '视频咨询'
                }[order.consultSource] || order.consultSource;
                
                item.innerHTML = `
                    <div class="order-id">${order.orderId}</div>
                    <div class="order-meta">
                        <span>患者: ${order.patientName} (${order.age}岁, ${order.gender === 'male' ? '男' : '女'})</span>
                        <span>来源: ${sourceText}</span>
                        <span>时间: ${new Date(order.consultTime).toLocaleString()}</span>
                    </div>
                    <div style="margin-top: 8px; color: #64748b; font-size: 0.9rem;">咨询内容: ${order.userConsultContent}</div>
                `;
                
                item.onclick = () => {
                    document.querySelectorAll('.order-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedOrderId = order.id;
                    document.getElementById('confirmOrderBtn').disabled = false;
                };
                
                list.appendChild(item);
            });
        }
        
        // 搜索订单
        function searchOrders() {
            const keyword = document.getElementById('orderSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderOrderList(consultationOrders);
                return;
            }
            
            const filtered = consultationOrders.filter(order => 
                order.patientName.toLowerCase().includes(keyword) ||
                order.orderId.toLowerCase().includes(keyword) ||
                new Date(order.consultTime).toLocaleDateString().includes(keyword)
            );
            
            renderOrderList(filtered);
        }
        
        // 确认订单选择
        function confirmOrderSelection() {
            if (!selectedOrderId) return;
            
            const order = consultationOrders.find(o => o.id === selectedOrderId);
            if (!order) return;
            
            // 填充新建档案表单
            document.getElementById('modalTitle').textContent = '新建咨询档案';
            document.getElementById('archiveForm').reset();
            editingArchiveId = null;
            
            document.getElementById('patientName').value = order.patientName;
            document.getElementById('patientGender').value = order.gender;
            document.getElementById('patientAge').value = order.age;
            document.getElementById('patientPhone').value = order.phone;
            document.getElementById('consultId').value = order.orderId;
            document.getElementById('consultSource').value = order.consultSource;
            document.getElementById('consultTime').value = order.consultTime.replace(' ', 'T');
            document.getElementById('userConsultContent').value = order.userConsultContent;
            
            closeOrderSelectModal();
            document.getElementById('createModal').style.display = 'flex';
            document.getElementById('medicalSolution').focus();
        }
        
        // 显示新建模态框
        function showCreateModal() {
            showOrderSelectModal(); // 改为先选订单
        }
        
        // 关闭新建模态框
        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }
        
        // 显示删除确认
        function showDeleteConfirm(id, name) {
            deletingArchiveId = id;
            document.getElementById('confirmMessage').textContent = `您确定要删除患者"${name}"的咨询档案吗？此操作不可恢复。`;
            document.getElementById('confirmModal').style.display = 'flex';
        }
        
        // 关闭删除确认
        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            deletingArchiveId = null;
        }
        
        // 显示提示
        function showAlertModal(title, message) {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertModal').style.display = 'flex';
        }
        
        // 关闭提示
        function closeAlertModal() {
            document.getElementById('alertModal').style.display = 'none';
        }
        
        // 验证表单
        function validateForm() {
            const requiredFields = [
                'patientName', 'patientGender', 'patientAge', 'patientPhone',
                'consultId', 'consultSource', 'consultTime', 'userConsultContent',
                'medicalSolution'
            ];
            
            for (const field of requiredFields) {
                const el = document.getElementById(field);
                if (!el.value.trim()) {
                    showAlertModal('提示', `请填写${el.previousElementSibling.textContent.replace('*', '')}`);
                    el.focus();
                    return false;
                }
            }
            return true;
        }
        
        // 保存为待提交
        function saveArchiveAsDraft() {
            if (validateForm()) saveArchiveLogic('draft');
        }
        
        // 归档档案
        function archivePatient() {
            if (validateForm()) saveArchiveLogic('archived');
        }
        
        // 保存档案逻辑
        function saveArchiveLogic(status) {
            const formData = {
                patientName: document.getElementById('patientName').value,
                gender: document.getElementById('patientGender').value,
                age: document.getElementById('patientAge').value,
                phone: document.getElementById('patientPhone').value,
                consultId: document.getElementById('consultId').value,
                consultSource: document.getElementById('consultSource').value,
                consultTime: document.getElementById('consultTime').value,
                userConsultContent: document.getElementById('userConsultContent').value,
                medicalSolution: document.getElementById('medicalSolution').value,
                additionalNotes: document.getElementById('additionalNotes').value,
                status: status,
                statusText: status === 'draft' ? '待提交' : status === 'archived' ? '已归档' : '待归档',
                createTime: new Date().toLocaleString(),
                updateTime: new Date().toLocaleString()
            };
            
            if (editingArchiveId) {
                // 编辑
                const index = consultationArchives.findIndex(a => a.id === editingArchiveId);
                if (index !== -1) {
                    consultationArchives[index] = { ...consultationArchives[index], ...formData };
                }
            } else {
                // 新建
                const newId = consultationArchives.length ? Math.max(...consultationArchives.map(a => a.id)) + 1 : 1;
                consultationArchives.unshift({ id: newId, ...formData });
                
                // 标记订单为已处理（从待归档订单中移除）
                const orderIndex = consultationOrders.findIndex(o => o.orderId === formData.consultId);
                if (orderIndex !== -1) {
                    consultationOrders.splice(orderIndex, 1);
                }
            }
            
            closeCreateModal();
            currentPage = 1;
            renderArchives(getCurrentPageArchives());
            updateSourceCounts();
            updateStatusCounts();
            updatePagination();
            showAlertModal('成功', `档案已${status === 'archived' ? '归档' : '保存为待提交'}！`);
        }
        
        // 编辑档案
        function editArchive(id) {
            const archive = consultationArchives.find(a => a.id === id);
            if (!archive) return;
            
            document.getElementById('modalTitle').textContent = '编辑咨询档案';
            editingArchiveId = id;
            
            // 填充表单
            document.getElementById('patientName').value = archive.patientName;
            document.getElementById('patientGender').value = archive.gender;
            document.getElementById('patientAge').value = archive.age;
            document.getElementById('patientPhone').value = archive.phone;
            document.getElementById('consultId').value = archive.consultId;
            document.getElementById('consultSource').value = archive.consultSource;
            document.getElementById('consultTime').value = archive.consultTime.replace(' ', 'T');
            document.getElementById('userConsultContent').value = archive.userConsultContent;
            document.getElementById('medicalSolution').value = archive.medicalSolution;
            document.getElementById('additionalNotes').value = archive.additionalNotes;
            
            document.getElementById('createModal').style.display = 'flex';
        }
        
        // 预览档案
        function previewArchive(id) {
            const archive = consultationArchives.find(a => a.id === id);
            if (!archive) return;
            
            const sourceText = {
                imageText: '图文咨询',
                phone: '电话咨询',
                video: '视频咨询'
            }[archive.consultSource] || archive.consultSource;
            
            document.getElementById('previewModalTitle').textContent = `咨询档案预览 - ${archive.patientName}`;
            document.getElementById('previewContent').innerHTML = `
                <div class="preview-meta">
                    <span>咨询ID: ${archive.consultId}</span>
                    <span>来源: ${sourceText}</span>
                    <span>时间: ${new Date(archive.consultTime).toLocaleString()}</span>
                    <span>状态: <span class="item-status ${getStatusClass(archive.status)}">${archive.statusText}</span></span>
                    <span>创建: ${archive.createTime}</span>
                    <span>更新: ${archive.updateTime}</span>
                </div>
                <div class="preview-content">
                    <h4>患者信息</h4>
                    <p>姓名: ${archive.patientName} | 性别: ${archive.gender === 'male' ? '男' : archive.gender === 'female' ? '女' : '其他'} | 年龄: ${archive.age}岁 | 电话: ${archive.phone}</p>
                    
                    <h4>用户咨询内容</h4>
                    <p>${archive.userConsultContent}</p>
                    
                    <h4>医护处理方案</h4>
                    <p>${archive.medicalSolution}</p>
                    
                    <h4>补充说明</h4>
                    <p>${archive.additionalNotes || '无'}</p>
                </div>
            `;
            
            document.getElementById('previewModal').style.display = 'flex';
        }
        
        // 获取状态样式
        function getStatusClass(status) {
            if (status === 'draft') return 'status-draft-bg';
            if (status === 'archived') return 'status-archived-bg';
            if (status === 'pending') return 'status-pending-bg';
            return '';
        }
        
        // 关闭预览
        function closePreviewModal() {
            document.getElementById('previewModal').style.display = 'none';
        }
        
        // 确认删除
        function confirmDelete() {
            if (deletingArchiveId) {
                const index = consultationArchives.findIndex(a => a.id === deletingArchiveId);
                if (index !== -1) {
                    // 如果是从待归档订单创建的档案，删除后恢复订单
                    const archive = consultationArchives[index];
                    if (archive.status === 'archived' || archive.status === 'draft') {
                        const order = consultationOrders.find(o => o.orderId === archive.consultId);
                        if (!order) {
                            consultationOrders.push({
                                id: Date.now(),
                                orderId: archive.consultId,
                                patientName: archive.patientName,
                                gender: archive.gender,
                                age: archive.age,
                                phone: archive.phone,
                                consultSource: archive.consultSource,
                                consultTime: archive.consultTime,
                                userConsultContent: archive.userConsultContent,
                                status: "pending"
                            });
                        }
                    }
                    
                    consultationArchives.splice(index, 1);
                    renderArchives(getCurrentPageArchives());
                    updateSourceCounts();
                    updateStatusCounts();
                    updatePagination();
                    showAlertModal('成功', '档案已删除！');
                }
            }
            closeConfirmModal();
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
</html>
